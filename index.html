<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Paper Feed — 2026-07-21</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0d0d1a;
            color: #e0e0e0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans SC", sans-serif;
            line-height: 1.6;
            min-height: 100vh;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 40px 20px;
        }
        header {
            margin-bottom: 40px;
            text-align: center;
        }
        header h1 {
            font-size: 1.8rem;
            color: #7c5cbf;
            margin-bottom: 8px;
            letter-spacing: 0.05em;
        }
        header .subtitle {
            font-size: 0.95rem;
            color: #888;
        }
        header .subtitle a {
            color: #7c5cbf;
            text-decoration: none;
        }
        header .subtitle a:hover {
            text-decoration: underline;
        }
        .stats-bar {
            text-align: center;
            margin-bottom: 30px;
            font-size: 0.9rem;
            color: #888;
        }
        .paper-card {
            background: #1a1a2e;
            border: 1px solid #2a2a4a;
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 20px;
            transition: border-color 0.2s, transform 0.2s;
            position: relative;
        }
        .paper-card:hover {
            border-color: #7c5cbf;
            transform: translateY(-2px);
        }
        .paper-number {
            position: absolute;
            top: 16px;
            right: 20px;
            font-size: 1.5rem;
            font-weight: 700;
            color: #2a2a4a;
            opacity: 0.5;
        }
        .paper-title {
            font-size: 1.1rem;
            margin-bottom: 8px;
            padding-right: 40px;
        }
        .paper-title a {
            color: #e0e0e0;
            text-decoration: none;
        }
        .paper-title a:hover {
            color: #7c5cbf;
        }
        .paper-meta {
            font-size: 0.8rem;
            color: #7c5cbf;
            margin-bottom: 16px;
            display: inline-block;
            background: rgba(124, 92, 191, 0.1);
            padding: 2px 10px;
            border-radius: 4px;
        }
        .paper-summary {
            margin-bottom: 16px;
        }
        .summary-row {
            margin-bottom: 8px;
            display: flex;
            gap: 8px;
        }
        .summary-label {
            flex-shrink: 0;
            font-size: 0.8rem;
            font-weight: 600;
            color: #7c5cbf;
            background: rgba(124, 92, 191, 0.08);
            padding: 1px 8px;
            border-radius: 4px;
            min-width: 56px;
            text-align: center;
        }
        .summary-text {
            font-size: 0.9rem;
            color: #ccc;
        }
        .paper-links {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        .link-btn {
            display: inline-block;
            padding: 6px 14px;
            border-radius: 6px;
            font-size: 0.85rem;
            text-decoration: none;
            transition: all 0.2s;
            background: rgba(124, 92, 191, 0.15);
            color: #7c5cbf;
            border: 1px solid transparent;
        }
        .link-btn:hover {
            background: rgba(124, 92, 191, 0.3);
            border-color: #7c5cbf;
        }
        .link-btn.project {
            background: rgba(76, 175, 80, 0.15);
            color: #66bb6a;
        }
        .link-btn.project:hover {
            background: rgba(76, 175, 80, 0.3);
            border-color: #66bb6a;
        }
        .empty-state {
            text-align: center;
            padding: 60px 20px;
        }
        .empty-state p {
            font-size: 1.2rem;
            margin-bottom: 12px;
        }
        .empty-state .hint {
            font-size: 0.9rem;
            color: #888;
        }
        footer {
            text-align: center;
            margin-top: 60px;
            padding-top: 20px;
            border-top: 1px solid #2a2a4a;
            font-size: 0.8rem;
            color: #888;
        }
        @media (max-width: 600px) {
            .container { padding: 20px 12px; }
            header h1 { font-size: 1.4rem; }
            .paper-card { padding: 16px; }
            .paper-title { font-size: 1rem; }
            .summary-row { flex-direction: column; gap: 2px; }
            .summary-label { align-self: flex-start; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📄 Daily Paper Feed</h1>
            <div class="subtitle">
                2026 年 07 月 21 日 星期二 · 共 0 篇相关论文 ·
                <a href="archive/">📚 历史存档</a>
            </div>
        </header>

        <div class="stats-bar">
            来源：<a href="https://papers.cool/arxiv/cs.CV" target="_blank" style="color:#7c5cbf;">cs.CV</a>
            · <a href="https://papers.cool/arxiv/cs.AI" target="_blank" style="color:#7c5cbf;">cs.AI</a>
            · 通过 papers.cool 抓取
        </div>

        
        <div class="empty-state">
            <p>📭 今天没有找到相关论文</p>
            <p class="hint">arXiv 在周五和周六不公布新文章，周末的投稿会在周日/周一一并公布。</p>
        </div>

        <footer>
            <p>Daily Paper Feed · 自动从 arXiv 抓取 · 基于研究兴趣筛选</p>
        </footer>
    </div>
</body>
</html>
