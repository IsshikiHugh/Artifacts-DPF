<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Paper Feed — 2026-07-21</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #fffcf5;
            color: #40534c;
            font-family: optima, Philosopher, Helvetica, Arial, Verdana, sans-serif;
            line-height: 1.6;
            min-height: 100vh;
        }
        ::selection {
            background: #eee7e1;
        }
        a {
            color: #81a263;
            text-decoration: none;
            transition: color 0.2s;
        }
        a:hover {
            color: #538392;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 40px 20px;
        }
        header {
            margin-bottom: 40px;
            text-align: center;
        }
        header h1 {
            font-size: 1.6rem;
            color: #5f6f65;
            margin-bottom: 8px;
            font-weight: 400;
        }
        header .subtitle {
            font-size: 0.9rem;
            color: #677d6a;
        }
        header .subtitle a {
            color: #81a263;
        }
        header .subtitle a:hover {
            color: #538392;
        }
        .paper-card {
            background: #fffcf5;
            border: 1px solid #eee7e1;
            border-radius: 8px;
            padding: 24px 28px;
            margin-bottom: 24px;
            box-shadow: 2px 2px 3px #f8f3ef,
                        2px 2px 7px #f8f3ef,
                        -1px -1px 3px #f8f3ef,
                        -1px -1px 7px #f8f3ef;
            transition: box-shadow 0.2s;
            position: relative;
        }
        .paper-card:hover {
            box-shadow: 0px 0px 3px #eee7e1,
                        1px 1px 4px #eee7e1,
                        1px 1px 8px #eee7e1;
        }
        .paper-title {
            font-size: 1.05rem;
            font-weight: 700;
            margin-bottom: 14px;
            line-height: 1.4;
        }
        .paper-title a {
            color: #40534c;
        }
        .paper-title a:hover {
            color: #538392;
        }
        .paper-authors {
            font-size: 0.82rem;
            color: #677d6a;
            margin-bottom: 14px;
            line-height: 1.4;
        }
        .paper-summary {
            margin-bottom: 14px;
        }
        .summary-row {
            margin-bottom: 6px;
            display: flex;
            gap: 8px;
        }
        .summary-label {
            flex-shrink: 0;
            font-size: 0.78rem;
            font-weight: 600;
            color: #5f6f65;
            padding: 1px 6px;
            min-width: 56px;
        }
        .summary-text {
            font-size: 0.88rem;
            color: #40534c;
            line-height: 1.5;
        }
        .paper-links {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        .link-btn {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 4px;
            font-size: 0.82rem;
            color: #81a263;
            border: 1px solid #eee7e1;
            transition: all 0.2s;
        }
        .link-btn:hover {
            color: #538392;
            border-color: #81a263;
        }
        .link-btn.project {
            color: #677d6a;
            border-color: #eee7e1;
        }
        .link-btn.project:hover {
            color: #538392;
            border-color: #81a263;
        }
        .empty-state {
            text-align: center;
            padding: 60px 20px;
        }
        .empty-state p {
            font-size: 1.1rem;
            margin-bottom: 12px;
        }
        .empty-state .hint {
            font-size: 0.85rem;
            color: #96a197;
        }
        footer {
            text-align: center;
            margin-top: 60px;
            padding-top: 20px;
            font-size: 0.78rem;
            color: #96a197;
            border-top: 1px solid #eee7e1;
        }
        @media (max-width: 600px) {
            .container { padding: 24px 16px; }
            header h1 { font-size: 1.3rem; }
            .paper-card { padding: 18px 20px; }
            .paper-title { font-size: 0.95rem; }
            .summary-row { flex-direction: column; gap: 2px; }
            .summary-label { align-self: flex-start; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Daily Paper Feed</h1>
            <div class="subtitle">
                2026 年 07 月 21 日 星期二 · 共 0 篇相关论文 ·
                <a href="index.html">全部存档</a>
            </div>
        </header>

        
        <div class="empty-state">
            <p>📭 今天没有找到相关论文</p>
            <p class="hint">arXiv 在周五和周六不公布新文章，周末的投稿会在周日/周一一并公布。</p>
        </div>

        <footer>
            <p>Daily Paper Feed · 自动筛选自 arXiv</p>
        </footer>
    </div>
</body>
</html>
